
save_dir: 'outputs/df3dgs/test1'
seed: 1
early_stop: 5
train_epoch: 50
devices: [0]


model_cfg:
  height: 352
  width: 640
  num_cams: 6
  embed_dim: 1024
  # freeze_patterns: ['aggregator','lpips']
  auto_scale_lr: True
  learning_rate: 0.00002
  # opt_eps: 0.000001
  # momentum: 0.9
  weight_decay: 0.01
  # scheduler_step_size: 15
  # scheduler_gamma: 0.1
  lr_restart_epoch: 5
  lr_restart_mult: 2
  lr_min_factor: 0.01

  frame_ids: [0, -1, 1]

  depth_conf_thr: 0.99
  min_depth: 1.5
  max_depth: 80
  focal_length_scale: 300
  init_scale_thr: 0.02
  sh_degree: 4
  
  save_image_duration: 100

  lambda_project: 1.0
  lambda_edge: 0.1
  lambda_depth: 0.001
  lambda_gaussian: 2
  lambda_scale: 0.01
  lambda_opacity: 0.01

  depth_net_cfg:
    height: 352
    width: 640
    scales: [0] 
    num_cams: 6
    
    novel_view_mode: 'MF' #'MF' # 'SF' # 

    num_layers: 18
    weights_init: True
    
    fusion_level: 2
    fusion_feat_in_dim: 256
    use_skips: False
    
    voxel_unit_size: [1.0, 1.0, 1.5] 
    voxel_size: [100, 100, 20] 
    voxel_str_p: [-50.0, -50.0, -15.0] 
    voxel_pre_dim: [64]
    proj_d_bins: 50
    proj_d_str: 2
    proj_d_end: 50

data_cfg:
  data_path: '<NUSCENES_ROOT>'
  height: 352
  width: 640
  back_context: 0
  forward_context: 6
  depth_type: 'lidar'
  cameras: ['CAM_FRONT', 'CAM_FRONT_LEFT', 'CAM_FRONT_RIGHT', 'CAM_BACK_LEFT', 'CAM_BACK_RIGHT', 'CAM_BACK']
  # gt_ego_pose, gt_depth is not used during training, only for visulization
  train_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)
  val_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)

  # crop_scale: [0.6, 1.0]
  # crop_ratio: [0.75, 1.33]
  # crop_prob: 0.5
  # jittering: [0.2, 0.2, 0.2, 0.05]
  # jittering_prob: 0.5
  
  batch_size: 5
  data_shuffle: True
  drop_last: False
  num_workers: 4



