
save_dir: 'outputs/vggt3dgs/test1'
seed: 1
early_stop: 5
train_epoch: 50
devices: [0]


model_cfg:
  height: 280
  width: 518

  render_frames: [1,2,3,4,5]
  render_nums: 4
  render_scale_min: 0.8
  render_scale_max: 1.2
  num_cams: 6
  embed_dim: 1024
  # freeze_patterns: ['aggregator','lpips']
  auto_scale_lr: True
  learning_rate: 0.00001
  # opt_eps: 0.000001
  # momentum: 0.9
  weight_decay: 0.01
  # scheduler_step_size: 15
  # scheduler_gamma: 0.1
  lr_restart_epoch: 5
  lr_restart_mult: 2
  lr_min_factor: 0.01

  depth_conf_thr: 0.99
  min_depth: 1.5
  max_depth: 110
  focal_length_scale: 300
  sh_degree: 4
  
  save_image_duration: 100

  lambda_project: 1.0
  lambda_edge: 0.1
  lambda_depth: 0.001
  lambda_gaussian: 2
  lambda_scale: 0.01
  lambda_opacity: 0.01


data_cfg:
  data_path: '<NUSCENES_ROOT>'
  version: 'interp_12Hz_trainval'
  height: 280
  width: 518
  back_context: 0
  forward_context: 5
  depth_type: 'lidar'
  cameras: ['CAM_FRONT', 'CAM_FRONT_LEFT', 'CAM_FRONT_RIGHT', 'CAM_BACK_LEFT', 'CAM_BACK_RIGHT', 'CAM_BACK']
  # gt_ego_pose, gt_depth is not used during training, only for visulization
  train_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)
  val_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)

  # crop_scale: [0.6, 1.0]
  # crop_ratio: [0.75, 1.33]
  # crop_prob: 0.5
  jittering: [0.2, 0.2, 0.2, 0.05]
  jittering_prob: 0.5
  
  batch_size: 4
  data_shuffle: True
  drop_last: False
  num_workers: 4
  # num_epochs: 10