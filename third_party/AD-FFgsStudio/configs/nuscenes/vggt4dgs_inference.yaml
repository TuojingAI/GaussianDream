
save_dir: 'outputs/vggt4dgs/test1'
seed: 555
early_stop: 5
train_epoch: 50
devices: [0,1,2,3,4,5,6,7]

model_cfg:
  height: 280
  width: 518

  frame_sfreq: 12.0

  render_scale_prob: 0.0
  render_scale_min: 0.9
  render_scale_max: 1.2
  num_cams: 6
  embed_dim: 1024
  # freeze_patterns: ['aggregator','lpips']
  auto_scale_lr: True
  learning_rate: 0.00005
  warmup_step: 512.0
  # opt_eps: 0.000001
  # momentum: 0.9
  weight_decay: 0.01
  # scheduler_step_size: 15
  # scheduler_gamma: 0.1
  lr_restart_epoch: 5
  lr_restart_mult: 2
  lr_min_factor: 0.01

  depth_conf_thr: 0.99
  min_depth: 1.0
  max_depth: 100

  sh_degree: 4
  
  save_image_duration: 400

  lambda_edge: 1.0
  lambda_project: 1.0
  lambda_gaussian: 1.0
  lambda_scale: 0.1
  lambda_opacity: 0.1


data_cfg:
  data_path: '<NUSCENES_ROOT>'
  version: 'interp_12Hz_trainval'
  sample_hz: 2
  height: 280
  width: 518
  back_context: 0
  forward_context: 6
  depth_type: 'lidar'
  cameras: ['CAM_FRONT', 'CAM_FRONT_LEFT', 'CAM_FRONT_RIGHT', 'CAM_BACK_LEFT', 'CAM_BACK_RIGHT', 'CAM_BACK']
  # gt_ego_pose, gt_depth is not used during training, only for visulization
  train_requirements: (gt_pose, mask)
  val_requirements: (gt_pose, mask)

  # crop_scale: [0.6, 1.0]
  # crop_ratio: [0.75, 1.33]
  # crop_prob: 0.5
  jittering: [0.2, 0.2, 0.2, 0.05]
  jittering_prob: 0.5
  
  batch_size: 1
  data_shuffle: True
  drop_last: False
  num_workers: 1
  # num_epochs: 10