# Run with:
# docker compose -f scripts/docker/compose.yml up --build
services:
  gaussiandream_server:
    image: gaussiandream_server
    build:
      context: ../..
      dockerfile: scripts/docker/serve_policy.Dockerfile
    init: true
    tty: true
    network_mode: host
    # Populate configured GaussianDream data home to /gaussiandream_assets inside the container.
    # Populate aws credential inside the container.
    volumes:
      - $PWD:/app
      - ${GAUSSIANDREAM_DATA_HOME:-~/.cache/gaussiandream}:/gaussiandream_assets
    environment:
      - SERVER_ARGS
      - GAUSSIANDREAM_DATA_HOME=/gaussiandream_assets
      - IS_DOCKER=true

    # Comment out this block if not running on a machine with GPUs.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
